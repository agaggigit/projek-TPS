<!DOCTYPE html>
<html>
<head>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
    canvas { display: block; max-width: 100%; margin: 0 auto; }
    #hud {
        display: flex; justify-content: space-between; align-items: center;
        max-width: 900px; margin: 8px auto 0; padding: 10px 20px;
        background: #16213e; border-radius: 8px; color: #ccc; font-size: 13px;
    }
    .hud-left { display: flex; align-items: center; gap: 10px; }
    .hud-right { display: flex; gap: 18px; }
    .hud-stat { white-space: nowrap; }
    .hud-stat .val { color: #4ecca3; font-weight: bold; }
    input[type=range] { width: 110px; vertical-align: middle; cursor: pointer; }
    #speedLabel { min-width: 40px; display: inline-block; color: #4ecca3; font-weight: bold; }
</style>
</head>
<body>

<canvas id="simCanvas" width="900" height="650"></canvas>
<div id="hud">
    <div class="hud-left">
        <span>⏩</span>
        <input type="range" id="speedSlider" min="1" max="200" value="30">
        <span id="speedLabel">30x</span>
    </div>
    <div class="hud-right">
        <div class="hud-stat">⏱️ <span class="val" id="dTime">0.0</span>s</div>
        <div class="hud-stat">🏍️ Antri: <span class="val" id="dQueue">0</span></div>
        <div class="hud-stat">⛽ Layani: <span class="val" id="dServe">0</span></div>
        <div class="hud-stat">✅ Selesai: <span class="val" id="dDone">0</span></div>
    </div>
</div>

<script>
// ============================================================
//  KONFIGURASI ASSET
//  Ganti null dengan path/URL gambar untuk custom assets.
//  Contoh: ASSET_VEHICLE = 'motor.png';
//  Jika null, akan menggunakan shape sederhana (kotak/lingkaran).
// ============================================================
const ASSET_VEHICLE = null;
const ASSET_PUMP_ACTIVE = null;
const ASSET_PUMP_INACTIVE = null;
const ASSET_BACKGROUND = null;

// Pre-load images if specified
let imgVehicle = null, imgPumpActive = null, imgPumpInactive = null, imgBg = null;
if (ASSET_VEHICLE)       { imgVehicle = new Image(); imgVehicle.src = ASSET_VEHICLE; }
if (ASSET_PUMP_ACTIVE)   { imgPumpActive = new Image(); imgPumpActive.src = ASSET_PUMP_ACTIVE; }
if (ASSET_PUMP_INACTIVE) { imgPumpInactive = new Image(); imgPumpInactive.src = ASSET_PUMP_INACTIVE; }
if (ASSET_BACKGROUND)    { imgBg = new Image(); imgBg.src = ASSET_BACKGROUND; }

// ============================================================
//  LAYOUT CONSTANTS — Denah SPBU Indonesia
// ============================================================
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const W = 900, H = 650;

// Road (bottom of canvas)
const ROAD_TOP = 570, ROAD_H = 80;
const ROAD_MID_Y = ROAD_TOP + ROAD_H / 2;

// Vertical lanes
const LANE_L_X = 140;   // Entry lane (left, goes UP)
const LANE_R_X = 760;   // Exit lane (right, goes DOWN)

// 3 Islands — top to bottom
const ISLANDS = [
    { label: "Island 1", x: 280, y: 45,  w: 340, h: 90 },
    { label: "Island 2", x: 280, y: 195, w: 340, h: 90 },
    { label: "Island 3", x: 280, y: 345, w: 340, h: 90 }
];

// Pump dimensions and offsets within each island
const PUMP_W = 55, PUMP_H = 35;
const PUMP_L_OX = 60;   // left pump offset from island.x
const PUMP_R_OX = 225;  // right pump offset from island.x
const PUMP_OY = 38;     // pump offset from island.y

// Queue configuration (along left lane, below Island 3)
const Q_FRONT_Y = 450;   // front of queue (nearest islands)
const Q_BACK_MAX_Y = 555; // furthest back (nearest road)

// Timing (sim seconds)
const ENTER_DUR = 2.0;
const TO_NOZZLE_DUR = 1.5;
const EXIT_DUR = 2.5;

// Motor color palette
const COLORS = [
    '#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7',
    '#DDA0DD','#FF8C42','#98D8C8','#F8B500','#7EC8E3',
    '#E056A0','#5DADE2','#F0B27A','#82E0AA','#BB8FCE'
];

// ============================================================
//  STATE (overwritten by Python injection)
// ============================================================
var customerLog = [];
var cNozzles = 1;
var simTime = 0;
var lastRealTime = 0;
var isRunning = false;
var animationId = null;
var prevPositions = {};
var prevAngles = {};

// ============================================================
//  UTILITY FUNCTIONS
// ============================================================
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * clamp(t, 0, 1); }

function followPath(pts, progress) {
    const p = clamp(progress, 0, 1);
    if (!pts || pts.length < 2) return pts ? { ...pts[0] } : { x: 0, y: 0 };
    let totalLen = 0, segs = [];
    for (let i = 1; i < pts.length; i++) {
        const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
        const len = Math.sqrt(dx * dx + dy * dy);
        segs.push(len); totalLen += len;
    }
    if (totalLen === 0) return { ...pts[0] };
    let target = p * totalLen, acc = 0;
    for (let i = 0; i < segs.length; i++) {
        if (acc + segs[i] >= target || i === segs.length - 1) {
            const sp = segs[i] > 0 ? (target - acc) / segs[i] : 0;
            return {
                x: pts[i].x + (pts[i+1].x - pts[i].x) * sp,
                y: pts[i].y + (pts[i+1].y - pts[i].y) * sp
            };
        }
        acc += segs[i];
    }
    return { ...pts[pts.length - 1] };
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ============================================================
//  POSITION HELPERS
// ============================================================
function getNozzlePos(nozzleId) {
    const id = Math.min(nozzleId, ISLANDS.length - 1);
    const isl = ISLANDS[id];
    return {
        x: isl.x + PUMP_L_OX + PUMP_W / 2,
        y: isl.y + PUMP_OY + PUMP_H / 2
    };
}

function getQueuePos(rank, totalInQueue) {
    if (totalInQueue <= 1) return { x: Q_FRONT_Y > 0 ? LANE_L_X : LANE_L_X, y: Q_FRONT_Y };
    const availableSpace = Q_BACK_MAX_Y - Q_FRONT_Y;
    const spacing = clamp(availableSpace / (totalInQueue - 1), 14, 30);
    return { x: LANE_L_X, y: Math.min(Q_FRONT_Y + rank * spacing, Q_BACK_MAX_Y) };
}

// ============================================================
//  DRAWING — STATIC ELEMENTS
// ============================================================
function drawBackground() {
    // Background image OR default
    if (imgBg && imgBg.complete && imgBg.naturalWidth > 0) {
        ctx.drawImage(imgBg, 0, 0, W, H);
        return; // skip drawing shapes if custom bg is loaded
    }

    // SPBU ground
    ctx.fillStyle = '#e8e4df';
    ctx.fillRect(0, 0, W, ROAD_TOP);

    // Canopy shadow over island area
    ctx.fillStyle = 'rgba(195, 195, 205, 0.45)';
    roundRect(245, 20, 410, ROAD_TOP - 45, 12);
    ctx.fill();

    // ---- Entry lane strip ----
    ctx.fillStyle = 'rgba(160,160,170,0.3)';
    ctx.fillRect(LANE_L_X - 20, 25, 40, ROAD_TOP - 25);

    // ---- Exit lane strip ----
    ctx.fillStyle = 'rgba(160,160,170,0.3)';
    ctx.fillRect(LANE_R_X - 20, 25, 40, ROAD_TOP - 25);

    // Direction arrows on lanes
    ctx.fillStyle = 'rgba(110,110,120,0.35)';
    ctx.font = '18px Segoe UI';
    ctx.textAlign = 'center';
    for (let y = 80; y < ROAD_TOP - 30; y += 70) {
        ctx.fillText('▲', LANE_L_X, y);
        ctx.fillText('▼', LANE_R_X, y);
    }

    // Lane labels near road
    ctx.fillStyle = '#777';
    ctx.font = 'bold 10px Segoe UI';
    ctx.fillText('MASUK', LANE_L_X, ROAD_TOP - 6);
    ctx.fillText('KELUAR', LANE_R_X, ROAD_TOP - 6);
    ctx.textAlign = 'start';

    // SPBU Header sign
    ctx.fillStyle = '#c0392b';
    roundRect(340, 2, 220, 26, 6);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('⛽  SPBU  PERTAMINA', W / 2, 20);
    ctx.textAlign = 'start';

    // Queue area dotted outline
    ctx.save();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(100,100,100,0.25)';
    ctx.lineWidth = 1;
    roundRect(LANE_L_X - 28, Q_FRONT_Y - 15, 56, Q_BACK_MAX_Y - Q_FRONT_Y + 30, 6);
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = 'rgba(100,100,100,0.4)';
    ctx.font = '9px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('ANTRIAN', LANE_L_X, Q_FRONT_Y - 20);
    ctx.textAlign = 'start';

    // ---- Road ----
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(0, ROAD_TOP, W, ROAD_H);

    // Road edge lines
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, ROAD_TOP + 2); ctx.lineTo(W, ROAD_TOP + 2);
    ctx.moveTo(0, ROAD_TOP + ROAD_H - 2); ctx.lineTo(W, ROAD_TOP + ROAD_H - 2);
    ctx.stroke();

    // Road center dashed yellow line
    ctx.save();
    ctx.setLineDash([25, 15]);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, ROAD_MID_Y); ctx.lineTo(W, ROAD_MID_Y);
    ctx.stroke();
    ctx.restore();

    // Road label
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = 'bold 20px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('J A L A N   R A Y A', W / 2, ROAD_MID_Y + 7);

    // Entry/Exit arrows on road
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '12px Segoe UI';
    ctx.fillText('→ Masuk', 55, ROAD_MID_Y - 18);
    ctx.fillText('Keluar →', W - 55, ROAD_MID_Y - 18);
    ctx.textAlign = 'start';
}

function drawIslands() {
    for (let i = 0; i < ISLANDS.length; i++) {
        const isl = ISLANDS[i];

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        roundRect(isl.x + 3, isl.y + 3, isl.w, isl.h, 8);
        ctx.fill();

        // Island body
        ctx.fillStyle = '#b5b5b5';
        roundRect(isl.x, isl.y, isl.w, isl.h, 8);
        ctx.fill();
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1.5;
        roundRect(isl.x, isl.y, isl.w, isl.h, 8);
        ctx.stroke();

        // Island label
        ctx.fillStyle = '#555';
        ctx.font = 'bold 11px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText(isl.label, isl.x + isl.w / 2, isl.y + 16);

        // Left pump (potentially active)
        drawPump(isl.x + PUMP_L_OX, isl.y + PUMP_OY, i, i < cNozzles);

        // Right pump (inactive in this simulation)
        drawPump(isl.x + PUMP_R_OX, isl.y + PUMP_OY, i + 3, false);

        ctx.textAlign = 'start';
    }
}

function drawPump(x, y, id, active) {
    // Use image asset if available
    if (active && imgPumpActive && imgPumpActive.complete && imgPumpActive.naturalWidth > 0) {
        ctx.drawImage(imgPumpActive, x, y, PUMP_W, PUMP_H);
    } else if (!active && imgPumpInactive && imgPumpInactive.complete && imgPumpInactive.naturalWidth > 0) {
        ctx.drawImage(imgPumpInactive, x, y, PUMP_W, PUMP_H);
    } else {
        // Default shape
        ctx.fillStyle = active ? '#27ae60' : '#666';
        roundRect(x, y, PUMP_W, PUMP_H, 5);
        ctx.fill();
        if (active) {
            ctx.strokeStyle = '#1e8449';
            ctx.lineWidth = 1.5;
            roundRect(x, y, PUMP_W, PUMP_H, 5);
            ctx.stroke();
        }
    }
    // Label
    ctx.fillStyle = '#fff';
    ctx.font = active ? 'bold 10px Segoe UI' : '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(active ? 'PUMP ' + id : '—', x + PUMP_W / 2, y + PUMP_H / 2 + 4);
}

// ============================================================
//  DRAWING — MOTOR (KENDARAAN)
// ============================================================
function drawMotor(x, y, id, color, angle, isServing) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle || 0);

    if (imgVehicle && imgVehicle.complete && imgVehicle.naturalWidth > 0) {
        // Custom image asset
        ctx.drawImage(imgVehicle, -15, -10, 30, 20);
    } else {
        // Default: rounded rectangle
        ctx.fillStyle = color;
        roundRect(-13, -8, 26, 16, 4);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1;
        roundRect(-13, -8, 26, 16, 4);
        ctx.stroke();

        // Headlight hint
        ctx.fillStyle = 'rgba(255,255,200,0.6)';
        ctx.fillRect(10, -3, 3, 6);
    }

    // ID label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(id, 0, 0);

    ctx.restore();

    // Serving pulsing ring
    if (isServing) {
        const pulse = Math.sin(simTime * 4) * 0.35 + 0.65;
        ctx.strokeStyle = 'rgba(46, 204, 113, ' + pulse + ')';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, 16, 0, Math.PI * 2);
        ctx.stroke();

        // Fuel icon hint
        ctx.fillStyle = 'rgba(46, 204, 113, ' + (pulse * 0.8) + ')';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('⛽', x, y - 20);
        ctx.textAlign = 'start';
    }
}

// ============================================================
//  MOTOR POSITION CALCULATOR
// ============================================================
function calcMotorInfo(c, simTime, queueRank, totalQ) {
    const waitTime = c.t_service_start - c.t_arrive;

    // Adaptive durations based on actual wait time
    const enterDur = Math.min(ENTER_DUR, Math.max(0.3, waitTime * 0.6));
    const toNozzleDur = Math.min(TO_NOZZLE_DUR, Math.max(0.2, waitTime * 0.35));

    const enterEnd = c.t_arrive + enterDur;
    const toNozzleStart = Math.max(enterEnd, c.t_service_start - toNozzleDur);
    const exitEnd = c.t_depart + EXIT_DUR;

    if (simTime < c.t_arrive) return null;
    if (simTime >= exitEnd) return { phase: 'gone' };

    const nozzlePos = getNozzlePos(c.nozzle);

    // ---- Phase 1: ENTERING (road → turn up → queue back) ----
    if (simTime < enterEnd) {
        const p = (simTime - c.t_arrive) / enterDur;
        // Entry target: back of current queue
        const backRank = Math.max(0, totalQ);
        const entryTarget = getQueuePos(backRank, totalQ + 1);
        const path = [
            { x: -30, y: ROAD_MID_Y },
            { x: LANE_L_X, y: ROAD_MID_Y },
            { x: LANE_L_X, y: entryTarget.y }
        ];
        return { pos: followPath(path, p), phase: 'entering' };
    }

    // ---- Phase 2: QUEUING (waiting in line) ----
    if (simTime < toNozzleStart) {
        const qPos = getQueuePos(queueRank, totalQ);
        return { pos: qPos, phase: 'queuing' };
    }

    // ---- Phase 3: TO_NOZZLE (queue front → up lane → right into island) ----
    if (simTime < c.t_service_start) {
        const p = (simTime - toNozzleStart) / (c.t_service_start - toNozzleStart);
        const fromPos = { x: LANE_L_X, y: Q_FRONT_Y };
        const path = [
            fromPos,
            { x: LANE_L_X, y: nozzlePos.y },
            nozzlePos
        ];
        return { pos: followPath(path, p), phase: 'to_nozzle' };
    }

    // ---- Phase 4: SERVING (parked at nozzle) ----
    if (simTime < c.t_depart) {
        return { pos: nozzlePos, phase: 'serving' };
    }

    // ---- Phase 5: EXITING (nozzle → right lane → down → road → off screen) ----
    const exitP = (simTime - c.t_depart) / EXIT_DUR;
    const exitPath = [
        nozzlePos,
        { x: LANE_R_X, y: nozzlePos.y },
        { x: LANE_R_X, y: ROAD_MID_Y },
        { x: W + 30, y: ROAD_MID_Y }
    ];
    return { pos: followPath(exitPath, exitP), phase: 'exiting' };
}

// ============================================================
//  MAIN ANIMATION LOOP
// ============================================================
function update(ts) {
    if (!isRunning) return;

    const dt = Math.min((ts - lastRealTime) / 1000, 0.1);
    lastRealTime = ts;

    const speed = parseInt(document.getElementById('speedSlider').value);
    document.getElementById('speedLabel').textContent = speed + 'x';
    simTime += dt * speed;

    // ---- Clear ----
    ctx.clearRect(0, 0, W, H);

    // ---- Static elements ----
    drawBackground();
    drawIslands();

    // ---- Determine queue members ----
    let queueMembers = [];
    for (const c of customerLog) {
        const waitTime = c.t_service_start - c.t_arrive;
        const enterDur = Math.min(ENTER_DUR, Math.max(0.3, waitTime * 0.6));
        const toNozzleDur = Math.min(TO_NOZZLE_DUR, Math.max(0.2, waitTime * 0.35));
        const enterEnd = c.t_arrive + enterDur;
        const toNozzleStart = Math.max(enterEnd, c.t_service_start - toNozzleDur);

        if (simTime >= enterEnd && simTime < toNozzleStart) {
            queueMembers.push(c);
        }
    }
    queueMembers.sort((a, b) => a.t_arrive - b.t_arrive);

    // Build rank map
    const rankMap = {};
    queueMembers.forEach((c, idx) => { rankMap[c.id] = idx; });
    const totalQ = queueMembers.length;

    // ---- Stats ----
    let nQueue = totalQ, nServe = 0, nDone = 0;

    // ---- Render each motor ----
    for (const c of customerLog) {
        const rank = rankMap[c.id] !== undefined ? rankMap[c.id] : 0;
        const info = calcMotorInfo(c, simTime, rank, totalQ);

        if (!info) continue;
        if (info.phase === 'gone') { nDone++; continue; }

        const pos = info.pos;
        const color = COLORS[c.id % COLORS.length];
        if (info.phase === 'serving') nServe++;

        // ---- Rotation from movement direction ----
        const prev = prevPositions[c.id] || { x: pos.x, y: pos.y };
        const dx = pos.x - prev.x, dy = pos.y - prev.y;
        let angle = prevAngles[c.id] || 0;
        if (Math.abs(dx) > 0.3 || Math.abs(dy) > 0.3) {
            angle = Math.atan2(dy, dx);
        }
        prevPositions[c.id] = { x: pos.x, y: pos.y };
        prevAngles[c.id] = angle;

        drawMotor(pos.x, pos.y, c.id, color, angle, info.phase === 'serving');
    }

    // ---- Update HUD ----
    document.getElementById('dTime').textContent = simTime.toFixed(1);
    document.getElementById('dQueue').textContent = nQueue;
    document.getElementById('dServe').textContent = nServe;
    document.getElementById('dDone').textContent = nDone;

    // ---- Continue loop ----
    animationId = requestAnimationFrame(update);
}

// ============================================================
//  AUTO-START
//  Jika customerLog sudah terisi (di-replace oleh Python),
//  langsung mulai animasi. Jika kosong, tampilkan overlay.
// ============================================================
if (customerLog && customerLog.length > 0) {
    // Data tersedia — langsung mulai animasi
    lastRealTime = performance.now();
    isRunning = true;
    drawBackground();
    drawIslands();
    animationId = requestAnimationFrame(update);
} else {
    // Belum ada data — tampilkan layout statis + overlay
    drawBackground();
    drawIslands();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('Menunggu data simulasi...', W / 2, H / 2 - 10);
    ctx.font = '13px Segoe UI';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Tekan "Jalankan Simulasi" untuk memulai animasi', W / 2, H / 2 + 18);
    ctx.textAlign = 'start';
}
</script>
</body>
</html>
